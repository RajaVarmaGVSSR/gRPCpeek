name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read version
        id: version
        shell: bash
        run: |
          VERSION=$(grep -oP '"version":\s*"\K[^"]+' grpcpeek/src-tauri/tauri.conf.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: grpcpeek/frontend/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './grpcpeek/src-tauri -> target'

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install frontend dependencies
        working-directory: grpcpeek/frontend
        run: npm ci

      - name: Build frontend
        working-directory: grpcpeek/frontend
        run: npm run build

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: grpcpeek
          args: ${{ matrix.platform == 'macos-latest' && '--target universal-apple-darwin' || '' }}

      - name: Package Windows Portable (ZIP)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $VERSION = "${{ steps.version.outputs.version }}"
          cd grpcpeek/src-tauri/target/release
          Compress-Archive -Path grpcpeek.exe -DestinationPath ../../../gRPCpeek-$VERSION-windows-portable.zip

      - name: Package macOS Portable (ZIP)
        if: matrix.platform == 'macos-latest'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cd grpcpeek/src-tauri/target/universal-apple-darwin/release/bundle/macos
          zip -r ../../../../../../gRPCpeek-$VERSION-macos-portable.zip gRPCpeek.app

      - name: Package Linux Portable (tar.gz)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cd grpcpeek/src-tauri/target/release
          tar -czf ../../../gRPCpeek-$VERSION-linux-portable.tar.gz grpcpeek

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-build
          path: |
            grpcpeek/src-tauri/target/release/bundle/**/*
            grpcpeek/gRPCpeek-*.zip
            grpcpeek/gRPCpeek-*.tar.gz
          retention-days: 7

  create-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          VERSION=$(grep -oP '"version":\s*"\K[^"]+' grpcpeek/src-tauri/tauri.conf.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release-files
          find artifacts/windows-latest-build -name "*.msi" -exec cp {} release-files/ \;
          find artifacts/windows-latest-build -name "*-setup.exe" -exec cp {} release-files/ \;
          find artifacts/windows-latest-build -name "*-windows-portable.zip" -exec cp {} release-files/ \;
          find artifacts/macos-latest-build -name "*.dmg" -exec cp {} release-files/ \;
          find artifacts/macos-latest-build -name "*-macos-portable.zip" -exec cp {} release-files/ \;
          find artifacts/ubuntu-latest-build -name "*.AppImage" -exec cp {} release-files/ \;
          find artifacts/ubuntu-latest-build -name "*.deb" -exec cp {} release-files/ \;
          find artifacts/ubuntu-latest-build -name "*-linux-portable.tar.gz" -exec cp {} release-files/ \;
          echo "Files to upload:"
          ls -lh release-files/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          draft: true
          tag_name: v${{ steps.version.outputs.version }}
          name: 'gRPCpeek v${{ steps.version.outputs.version }}'
          body: |
            ## gRPCpeek v${{ steps.version.outputs.version }}

            ### Installation

            **Portable Executables** (no installation required) ⭐:
            - **Windows**: Download the `-windows-portable.zip`, extract, and run `grpcpeek.exe`
            - **macOS**: Download the `-macos-portable.zip`, extract, run `xattr -cr gRPCpeek.app`, then open
            - **Linux**: Download the `.AppImage`, make it executable (`chmod +x`), and run

            **Traditional Installers**:
            - Windows: `.msi` or `-setup.exe`
            - macOS: `.dmg`
            - Linux: `.deb`

            ⚠️ **Note**: These builds are unsigned. Windows may show SmartScreen warnings, and macOS will require Gatekeeper bypass.
          files: release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
